 <link rel="preload" href="{{ base_path }}/assets/css/fontawesome.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css"></noscript>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->

<meta name="theme-color" content="#fdfcf9"/>

<!-- Web fonts to match Source Serif 4 (body) and JetBrains Mono (code) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Font + background overrides -->
<style>
  :root {
    --site-bg: #fdfcf9;
    --site-bg-soft: #f6f4ef;
    --site-ink: #14181d;
    --site-muted: #6b7480;
    --site-accent: #1a3a5c;
    --site-serif: "Source Serif 4", "Source Serif Pro", Georgia, "Times New Roman", serif;
    --site-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
    --site-sans: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
  }
  html, body, .page__content, .page__title, .sidebar, .author__name, .author__bio,
  .archive__item-title, .archive__item-excerpt, .masthead, .greedy-nav, .page__footer {
    font-family: var(--site-serif);
  }
  html, body { background-color: var(--site-bg); color: var(--site-ink); }
  .masthead, .page__footer, .greedy-nav { background-color: var(--site-bg); }
  .author__bio, .page__meta, .archive__item-excerpt { color: var(--site-muted); }
  h1, h2, h3, h4, h5, h6 { font-family: var(--site-serif); }
  a { color: var(--site-accent); }
  pre, code, tt, kbd, samp, .archive__item-title code { font-family: var(--site-mono); }
  /* Publications hierarchy: section headings larger than paper titles */
  .archive__subtitle {
    font-size: 1.5rem;
    font-weight: 700;
    color: var(--site-ink);
    margin: 1.9rem 0 0.6rem;
    padding-bottom: 0.25rem;
    border-bottom: 1px solid rgba(20, 24, 29, 0.15);
  }
  .archive__item-title {
    font-size: 1.05rem;
    font-weight: 600;
    margin: 0 0 0.1rem;
    line-height: 1.35;
  }
  .archive__item-title a { color: var(--site-accent); }
  /* Tighten the gaps between title / venue / authors within one paper */
  .archive__item > p { margin: 0.1rem 0; line-height: 1.3; }
  /* Conference/venue line in monospace; author list in sans-serif */
  .archive__item > p:not(.archive__item-excerpt) { font-family: var(--site-mono); font-size: 0.85rem; }
  .archive__item-excerpt, .archive__item-excerpt p { font-family: var(--site-sans); }
  .archive__item-excerpt { font-size: 0.9rem; margin: 0.1rem 0; color: var(--site-muted); }
  .archive__item-excerpt p { margin: 0; }
  /* Keep a clear separation between papers */
  .list__item { margin-bottom: 1.1rem; }
</style>

<!-- end custom head snippets -->
