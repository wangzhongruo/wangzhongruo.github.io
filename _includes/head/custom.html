{% include base_path %}

<!-- start custom head snippets -->

<!-- Support for Academicons -->
<link rel="preload" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/jpswalsh/academicons@1/css/academicons.min.css"></noscript>

<!-- Support for Font Awesome -->
 <link rel="preload" href="{{ base_path }}/assets/css/fontawesome.css" as="style" onload="this.onload=null;this.rel='stylesheet'">
<noscript><link rel="stylesheet" href="{{ base_path }}/assets/css/fontawesome.css"></noscript>

<!-- favicon from https://commons.wikimedia.org/wiki/File:OOjs_UI_icon_academic-progressive.svg -->
<link rel="apple-touch-icon" sizes="180x180" href="{{ base_path }}/images/apple-touch-icon-180x180.png"/>
<link rel="icon" type="image/svg+xml" href="{{ base_path }}/images/favicon.svg"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-32x32.png" sizes="32x32"/>
<link rel="icon" type="image/png" href="{{ base_path }}/images/favicon-192x192.png" sizes="192x192"/>
<link rel="manifest" href="{{ base_path }}/images/manifest.json"/>
<link rel="icon" href="/images/favicon.ico"/>
<meta name="theme-color" content="#fdfcf9"/>

<!-- Web fonts to match Source Serif 4 (body) and JetBrains Mono (code) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:opsz,wght@8..60,300;8..60,400;8..60,500;8..60,600;8..60,700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">

<!-- Font + background overrides -->
<style>
  :root {
    --site-bg: #fdfcf9;
    --site-bg-soft: #f6f4ef;
    --site-ink: #14181d;
    --site-muted: #6b7480;
    --site-accent: #1a3a5c;
    --site-serif: "Source Serif 4", "Source Serif Pro", Georgia, "Times New Roman", serif;
    --site-mono: "JetBrains Mono", "IBM Plex Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
  }
  html, body, .page__content, .page__title, .sidebar, .author__name, .author__bio,
  .archive__item-title, .archive__item-excerpt, .masthead, .greedy-nav, .page__footer {
    font-family: var(--site-serif);
  }
  html, body { background-color: var(--site-bg); color: var(--site-ink); }
  .masthead, .page__footer, .greedy-nav { background-color: var(--site-bg); }
  .author__bio, .page__meta, .archive__item-excerpt { color: var(--site-muted); }
  h1, h2, h3, h4, h5, h6 { font-family: var(--site-serif); }
  a { color: var(--site-accent); }
  pre, code, tt, kbd, samp, .archive__item-title code { font-family: var(--site-mono); }
</style>

<!-- end custom head snippets -->
